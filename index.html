<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDO STORE | متجر ميدو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: url('https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?q=80&w=2066&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center px-8">
        <h1 class="text-2xl font-bold tracking-widest">MEDO STORE</h1>
        <div class="flex gap-4">
            <button onclick="toggleLang()" id="langBtn" class="bg-white text-black px-4 py-1 rounded-full text-sm font-bold">English</button>
            <button onclick="openAdmin()" class="hover:text-gray-300"><i data-lucide="user"></i></button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-8">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- المنتجات هتظهر هنا -->
        </div>
    </main>

    <!-- Order Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-md">
            <h2 id="modalTitle" class="text-xl mb-4 font-bold">إتمام الطلب</h2>
            <form id="orderForm" class="space-y-4">
                <input type="text" id="custName" placeholder="الاسم الثلاثي" class="w-full p-2 rounded bg-white/20 border border-white/30 text-white placeholder-white/60" required>
                <input type="text" id="custGov" placeholder="المحافظة" class="w-full p-2 rounded bg-white/20 border border-white/30" required>
                <input type="text" id="custAddress" placeholder="العنوان بالتفصيل" class="w-full p-2 rounded bg-white/20 border border-white/30" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full p-2 rounded bg-white/20 border border-white/30" required>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-xl font-bold">تأكيد الطلب عبر واتساب</button>
                <button type="button" onclick="closeModal()" class="w-full text-sm text-gray-400">إلغاء</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="fixed inset-0 bg-black hidden z-[70] overflow-y-auto p-4">
        <div class="max-w-4xl mx-auto glass p-8 rounded-2xl mt-10">
            <div class="flex justify-between mb-8">
                <h2 class="text-2xl font-bold">لوحة التحكم</h2>
                <button onclick="closeAdmin()" class="bg-red-500 px-4 py-2 rounded">إغلاق</button>
            </div>
            
            <div id="adminLogin" class="space-y-4">
                <input type="password" id="adminPassInput" placeholder="كلمة المرور" class="w-full p-2 rounded bg-white/10 border border-white/30 text-white">
                <button onclick="login()" class="w-full bg-blue-600 p-2 rounded font-bold">دخول</button>
            </div>

            <div id="adminContent" class="hidden">
                <div class="grid md:grid-cols-2 gap-8">
                    <!-- Add Product -->
                    <div class="space-y-4 border-b md:border-b-0 md:border-l border-white/20 pb-8 md:pb-0 md:pl-8">
                        <h3 class="text-lg font-bold">إضافة منتج جديد</h3>
                        <input type="text" id="pName" placeholder="اسم المنتج" class="w-full p-2 rounded bg-white/10 border border-white/30 text-white">
                        <input type="text" id="pPrice" placeholder="السعر" class="w-full p-2 rounded bg-white/10 border border-white/30 text-white">
                        <input type="file" id="pImage" accept="image/*" class="w-full text-sm">
                        <button onclick="addProduct()" class="w-full bg-green-600 p-2 rounded font-bold">حفظ المنتج</button>
                    </div>
                    <!-- Settings -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-bold text-red-400">الإعدادات</h3>
                        <input type="text" id="newPass" placeholder="كلمة مرور جديدة" class="w-full p-2 rounded bg-white/10 border border-white/30 text-white">
                        <button onclick="changePass()" class="w-full bg-orange-600 p-2 rounded font-bold">تغيير باسورد الإدارة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- الأساسيات ---
        let products = JSON.parse(localStorage.getItem('medo_products')) || [
            {id: 1, name: 'هودي شتوي فاخر', price: '850', img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500'},
            {id: 2, name: 'جاكيت بومبر كول', price: '1200', img: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500'}
        ];
        let adminPass = localStorage.getItem('medo_admin_pass') || '55555';
        let currentLang = 'ar';

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card glass rounded-2xl overflow-hidden">
                    <img src="${p.img}" class="w-full h-64 object-cover">
                    <div class="p-4 text-center">
                        <h3 class="text-xl font-bold">${p.name}</h3>
                        <p class="text-orange-400 font-bold mt-2">${p.price} EGP</p>
                        <button onclick="openOrder('${p.name}')" class="mt-4 w-full bg-white text-black py-2 rounded-xl font-bold hover:bg-gray-200">اطلب الآن</button>
                    </div>
                </div>
            `).join('');
        }

        // --- المزامنة (السر هنا) ---
        // ملاحظة: لربط السحابة بجد، يفضل استخدام Firebase. 
        // حالياً سأجعل الكود يستخدم LocalStorage مع ميزة التصدير والاستيراد لسهولة النقل.
        
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imageFile = document.getElementById('pImage').files[0];

            if(!name || !price || !imageFile) return alert("اكمل البيانات");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newP = { id: Date.now(), name, price, img: e.target.result };
                products.push(newP);
                localStorage.setItem('medo_products', JSON.stringify(products));
                renderProducts();
                alert("تمت الإضافة بنجاح!");
            };
            reader.readAsDataURL(imageFile);
        }

        function login() {
            const pass = document.getElementById('adminPassInput').value;
            if(pass === adminPass) {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
            } else { alert("خطأ!"); }
        }

        function changePass() {
            const np = document.getElementById('newPass').value;
            if(np) {
                adminPass = np;
                localStorage.setItem('medo_admin_pass', np);
                alert("تم تغيير الباسورد");
            }
        }

        function openOrder(pName) {
            window.selectedProduct = pName;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            const text = `طلب جديد من ميدو ستور:%0Aالمنتج: ${window.selectedProduct}%0Aالاسم: ${document.getElementById('custName').value}%0Aالمحافظة: ${document.getElementById('custGov').value}%0Aالعنوان: ${document.getElementById('custAddress').value}%0Aالهاتف: ${document.getElementById('custPhone').value}`;
            window.open(`https://wa.me/201143304017?text=${text}`);
            alert("تم الطلب بنجاح! سيصلك الشحن خلال 3 إلى 5 أيام عمل");
            closeModal();
        };

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }
        function openAdmin() { document.getElementById('adminPanel').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.add('hidden'); }

        lucide.createIcons();
        renderProducts();
    </script>
</body>
</html>
